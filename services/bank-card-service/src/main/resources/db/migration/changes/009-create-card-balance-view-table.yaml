databaseChangeLog:
  - changeSet:
      id: 009-create-card-balance-view-table
      author: fedor
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: card_balance_view

      changes:
        - createTable:
            tableName: card_balance_view
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_card_balance_view
                    nullable: false

              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: balance_updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: received_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: card_balance_view
            columnNames: card_id
            constraintName: uq_card_balance_view_card_id

        - createIndex:
            tableName: card_balance_view
            indexName: idx_card_balance_view_user_id
            columns:
              - column:
                  name: user_id