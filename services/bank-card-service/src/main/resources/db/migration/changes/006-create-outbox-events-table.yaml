databaseChangeLog:
  - changeSet:
      id: 006-create-outbox-events-table
      author: fedor
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: outbox_events

      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_outbox_events
                    nullable: false

              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: aggregate_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: topic
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: sent_at
                  type: TIMESTAMP WITH TIME ZONE

              - column:
                  name: error_message
                  type: TEXT

        - addUniqueConstraint:
            tableName: outbox_events
            columnNames: event_id
            constraintName: uq_outbox_events_event_id

        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at