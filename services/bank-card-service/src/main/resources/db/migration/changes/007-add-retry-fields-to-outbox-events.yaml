databaseChangeLog:
  - changeSet:
      id: 007-add-retry-fields-to-outbox-events
      author: fedor
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: outbox_events
        - not:
            columnExists:
              tableName: outbox_events
              columnName: retry_count

      changes:
        - addColumn:
            tableName: outbox_events
            columns:
              - column:
                  name: retry_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: next_retry_at
                  type: TIMESTAMP WITH TIME ZONE

        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status_next_retry_at_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: next_retry_at
              - column:
                  name: created_at