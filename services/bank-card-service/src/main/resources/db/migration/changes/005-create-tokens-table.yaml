databaseChangeLog:
  - changeSet:
      id: 005-create-tokens-table
      author: freddykray

      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: tokens

      changes:
        - createTable:
            tableName: tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: access_token
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: refresh_token
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: is_logged_out
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tokens_users

        - addUniqueConstraint:
            tableName: tokens
            columnNames: refresh_token
            constraintName: uq_tokens_refresh_token