databaseChangeLog:
  - changeSet:
      id: 002-create-processed-events-table
      author: fedor
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: processed_events

      changes:
        - createTable:
            tableName: processed_events
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_processed_events
                    nullable: false

              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: processed_events
            columnNames: event_id
            constraintName: uq_processed_events_event_id

        - createIndex:
            tableName: processed_events
            indexName: idx_processed_events_event_type
            columns:
              - column:
                  name: event_type