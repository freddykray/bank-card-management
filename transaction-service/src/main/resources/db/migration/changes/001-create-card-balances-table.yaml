databaseChangeLog:
  - changeSet:
      id: 001-create-card-balances-table
      author: fedor
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: card_balances

      changes:
        - createTable:
            tableName: card_balances
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_card_balances
                    nullable: false

              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: card_balances
            columnNames: card_id
            constraintName: uq_card_balances_card_id

        - createIndex:
            tableName: card_balances
            indexName: idx_card_balances_user_id
            columns:
              - column:
                  name: user_id