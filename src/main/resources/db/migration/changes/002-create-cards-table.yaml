databaseChangeLog:
  - changeSet:
      id: 002-create-cards-table
      author: fedor
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: cards
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: encrypted_card_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: card_number_last4
                  type: VARCHAR(4)
                  constraints:
                    nullable: false

              - column:
                  name: owner_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: block_requested
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: block_requested_at
                  type: TIMESTAMP

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: deleted_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_user