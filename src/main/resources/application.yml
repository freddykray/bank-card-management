app:
  crypto:
    card-secret-key: ${CARD_SECRET_KEY:12345678901234567890123456789012}
  jwt:
    secret: ${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
    expiration: 3600000
  cors:
    allowed-origins:
      - http://localhost:8080

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_cards_db
    username: postgresql
    password: postgresql
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/migration/db.migration-master.yaml

  logging:
    level:
      root: INFO
      com.example.bankcards: DEBUG
      org.springframework.security: INFO
      org.hibernate.SQL: DEBUG
      org.hibernate.orm.jdbc.bind: TRACE

