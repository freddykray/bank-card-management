app:
  crypto:
    card-secret-key: ${CARD_SECRET_KEY:change-this-card-secret-key-32-char}

  jwt:
    secret: ${JWT_SECRET:change-this-jwt-secret-key-minimum-64-chars}
    expiration: ${JWT_EXPIRATION:3600000}

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bank_cards_db}
    username: ${DB_USERNAME:postgresql}
    password: ${DB_PASSWORD:postgresql}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

  liquibase:
    change-log: classpath:db/migration/db.migration-master.yaml

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.example.bankcards: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_HIBERNATE_BIND:TRACE}